<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <%- include('src/ejs/partials/head.ejs') %>
  </head>
  <body class="d-flex flex-column min-vh-100 page-product">
    <%- include('src/ejs/partials/header.ejs') %>

    <main class="flex-grow-1 py-5">
      <div class="container">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4">
          <div>
            <h1 class="fw-bold mb-2">產品服務 Product</h1>
            <p class="text-secondary mb-0">這裡可以放產品卡片、服務項目與 CTA。</p>
          </div>
          <a class="btn btn-primary" href="./contact.html">聯絡我們</a>
        </div>

        <div class="row g-4">
          <div class="col-md-4">
            <article class="card h-100 shadow-sm rounded-4 border-0">
              <div class="card-body p-4">
                <h2 class="h5">方案 A</h2>
                <p class="text-secondary">適合剛開始練習 Bootstrap 元件與排版。</p>
              </div>
            </article>
          </div>
          <div class="col-md-4">
            <article class="card h-100 shadow-sm rounded-4 border-0">
              <div class="card-body p-4">
                <h2 class="h5">方案 B</h2>
                <p class="text-secondary">適合加入更多 Sass 元件與頁面模組。</p>
              </div>
            </article>
          </div>
          <div class="col-md-4">
            <article class="card h-100 shadow-sm rounded-4 border-0">
              <div class="card-body p-4">
                <h2 class="h5">方案 C</h2>
                <p class="text-secondary">適合部署到 GitHub Pages 做公開展示。</p>
              </div>
            </article>
          </div>
        </div>
      </div>
    </main>

    <%- include('src/ejs/partials/footer.ejs') %>
    <script type="module" src="/src/js/pages/product.js"></script>
  </body>
</html>
