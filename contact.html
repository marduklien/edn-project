<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <%- include('src/ejs/partials/head.ejs') %>
  </head>
  <body class="d-flex flex-column min-vh-100 page-contact">
    <%- include('src/ejs/partials/header.ejs') %>

    <main class="flex-grow-1 py-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-5">
            <h1 class="fw-bold mb-3">聯絡我們 Contact</h1>
            <p class="text-secondary">
              這裡可以放聯絡資訊、客服信箱、營業時間或其他轉換目標。
            </p>
          </div>
          <div class="col-lg-7">
            <form class="card shadow-sm rounded-4 border-0" data-contact-form>
              <div class="card-body p-4">
                <div class="mb-3">
                  <label class="form-label" for="name">姓名</label>
                  <input class="form-control" id="name" type="text" placeholder="請輸入姓名" />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-control" id="email" type="email" placeholder="name@example.com" />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="message">訊息</label>
                  <textarea class="form-control" id="message" rows="4" placeholder="請輸入訊息"></textarea>
                </div>
                <button class="btn btn-primary" type="submit">送出</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <%- include('src/ejs/partials/footer.ejs') %>
    <script type="module" src="/src/js/pages/contact.js"></script>
  </body>
</html>
